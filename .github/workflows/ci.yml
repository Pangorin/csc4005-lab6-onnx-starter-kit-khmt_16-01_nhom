name: structure-check

on:
  push:
  pull_request:

jobs:
  structure-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check starter structure
        run: python ci/check_structure.py
